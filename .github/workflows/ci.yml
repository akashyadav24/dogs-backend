name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    # Ubuntu 22.04: mongodb-memory-server downloads a MongoDB binary that
    # officially supports this release.
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test
